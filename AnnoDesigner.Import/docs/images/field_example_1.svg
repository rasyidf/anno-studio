<svg xmlns="http://www.w3.org/2000/svg" style="background-color: #f0f0f0;" viewBox="0 0 400 300" width="200" height="150">
    <defs>
        <rect id="tile-f" width="100" height="100"/>
    </defs>
    <g fill="#666" stroke="#000000" stroke-width="2">
        <!-- Row 1 -->
        <use href="#tile-f" x="0" y="0"/>
        <use href="#tile-f" x="100" y="0"/>
        <use href="#tile-f" x="200" y="0"/>
        <use href="#tile-f" x="300" y="0"/>
        <!-- Row 2 -->
        <use href="#tile-f" x="0" y="100"/>
        <use href="#tile-f" x="100" y="100"/>
        <use href="#tile-f" x="200" y="100"/>
        <use href="#tile-f" x="300" y="100"/>
        <!-- Row 3 -->
        <use href="#tile-f" x="0" y="200"/>
        <use href="#tile-f" x="100" y="200"/>
        <use href="#tile-f" x="200" y="200"/>
        <use href="#tile-f" x="300" y="200"/>
    </g>
</svg>
